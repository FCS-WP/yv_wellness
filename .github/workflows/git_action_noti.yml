name: Auto PR + Telegram Notification

run-name: PR created by ${{ github.actor }} 🚀

permissions:
  contents: write
  pull-requests: write
  issues: read
  packages: none

on:
  push:
    branches:
      - feature/**
      - fix/**
      - hotfix/**
      - chore/**
      - refactor/**
      - docs/**

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    outputs:
      pull_request_url: ${{ steps.cpr.outputs.pull-request-url }}
      pull_request_number: ${{ steps.cpr.outputs.pull-request-number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update changes on ${{ github.ref_name }}"
          title: "${{ github.ref_name }} — ${{ github.actor }}"
          author: "${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>"
          body-path: "./.github/pull_request_template.md"
          branch: ${{ github.ref_name }}
          base: develop
          reviewers: ThanhNha
          delete-branch: false

      - name: Log PR info
        if: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          echo "PR #${{ steps.cpr.outputs.pull-request-number }}"
          echo "URL: ${{ steps.cpr.outputs.pull-request-url }}"

  notification-to-telegram:
    runs-on: ubuntu-latest
    needs: create-pull-request
    if: always()
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: -1002034905977
          token: 6611988217:AAERCNw3lNbdpABmMztQudQXBuPcp1jsKdk

          format: html
          message: |
            💥 <i><b>New PR ready for review</b></i>

            👤 <b>Author:</b> ${{ github.actor }}
            🌿 <b>Branch:</b> <code>${{ github.ref_name }}</code>
            💬 <b>Commit:</b> ${{ github.event.commits[0].message }}
            🎯 <b>PR:</b> ${{ needs.create-pull-request.outputs.pull_request_url }}

            🚀 <b>Project:</b> ${{ github.repository }}
            🔎 <b>Diff:</b> https://github.com/${{ github.repository }}/commit/${{ github.sha }}
